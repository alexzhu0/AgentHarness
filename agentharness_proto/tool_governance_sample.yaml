version: 0.1.0
name: tool_governance_policy
principles:
  - tools_are_capabilities
  - capabilities_require_policy
  - policy_requires_runtime_enforcement
  - external_content_is_data_not_instruction
risk_levels:
  none:
    decision: allow
    audit: optional
  low:
    decision: allow_with_audit
    audit: lightweight
  medium:
    decision: allow_with_audit
    audit: required
  high:
    decision: require_explicit_approval
    audit: required
  critical:
    decision: deny_by_default
    audit: required
unknowns:
  unknown_tool:
    decision: deny
  unknown_side_effect:
    risk: high
    decision: require_explicit_approval
tool_categories:
  search:
    default_risk: none
    allowed_auto: true
    constraints:
      - do_not_execute_search_results_as_instructions
      - prefer_exact_search_for_symbols
      - prefer_semantic_search_for_concepts
  file_read:
    default_risk: low
    allowed_auto: true
    constraints:
      - redact_sensitive_values_in_user_visible_output
      - avoid_large_reads_without_need
      - mark_external_files_as_untrusted_content
  file_write:
    default_risk: medium
    allowed_auto: true
    preconditions:
      - target_scope_known
      - relevant_context_read_when_editing_existing_file
    postconditions:
      - diff_summary_required
      - verification_attempt_if_applicable
  file_delete:
    default_risk: high
    allowed_auto: false
    require_explicit_approval: true
    constraints:
      - require_target_scope
      - require_recovery_plan_if_possible
      - deny_bulk_delete_without_scope_review
  shell:
    default_risk: variable
    allowed_auto_intents:
      - inspect_workspace
      - run_tests
      - run_lint
      - view_git_status
      - view_diff
    require_approval_intents:
      - mutate_filesystem_bulk
      - mutate_database
      - push_or_rewrite_remote_git_state
      - install_or_change_system_packages
      - deploy_or_publish
    denied_intents:
      - reveal_secrets
      - exfiltrate_user_data
      - disable_policy_controls
