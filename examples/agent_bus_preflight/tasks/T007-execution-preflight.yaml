id: T007-execution-preflight
title: Validate execution preflight decisions without execution
owner: executor
status: completed
objective:
  ref: T007-execution-preflight#objective
  statement: Prove that execution preflight can classify tool gate entries without executing tools or changing task lifecycle.
acceptance_criteria:
  - Ledger contains the normal assigned to completed lifecycle.
  - Executor evidence references a side-effect-free tool gate report from executor_done only.
  - Designer review references one approval record and one preflight report.
  - Preflight report includes ready_without_approval, ready_with_approval, blocked_missing_approval, and blocked_by_policy cases.
  - Every preflight result remains not_executed.
constraints:
  - Do not execute tools.
  - Do not add daemon behavior.
  - Do not add scheduler or watcher behavior.
  - Do not add task mutation CLI.
  - Do not add lifecycle statuses.
verification:
  commands:
    - PYTHONDONTWRITEBYTECODE=1 ./agentharness loop check examples/agent_bus_preflight
    - PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=src python3 -m unittest discover -s tests
retry_policy:
  max_attempts: 3
  require_new_failure_hypothesis: true
failure_classes:
  allowed:
    - verification_failed
    - baseline_drift
    - policy_violation
    - missing_evidence
    - objective_mismatch
    - invalid_ledger
    - repeated_failure_without_new_hypothesis
  automatic_retry:
    - verification_failed
    - baseline_drift
    - missing_evidence
  escalate:
    - policy_violation
    - objective_mismatch
    - invalid_ledger
    - repeated_failure_without_new_hypothesis
audit:
  ledger_path: ledger.jsonl
  evidence_dir: evidence
  review_dir: reviews
  tool_gate_dir: tool_gates
  approval_dir: approvals
  preflight_dir: preflight
  objective_ref: T007-execution-preflight#objective
