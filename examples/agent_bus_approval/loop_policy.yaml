version: 0.1.0
name: file_bus_loop_approval_policy
runtime_layout:
  root: .agent_bus
  ledger: .agent_bus/ledger.jsonl
  tasks: .agent_bus/tasks
  evidence: .agent_bus/evidence
  reviews: .agent_bus/reviews
  tool_gates: .agent_bus/tool_gates
  approvals: .agent_bus/approvals
fixture_layout:
  root: examples/agent_bus_approval
  ledger: examples/agent_bus_approval/ledger.jsonl
  tasks: examples/agent_bus_approval/tasks
  evidence: examples/agent_bus_approval/evidence
  reviews: examples/agent_bus_approval/reviews
  tool_gates: examples/agent_bus_approval/tool_gates
  approvals: examples/agent_bus_approval/approvals
source_of_truth:
  ledger_jsonl: true
  tool_gate_reports_are_evidence: true
  approval_records_are_audit_evidence: true
  decisions_log: deferred
tool_gate_validation:
  policy_path: examples/agent_policy.example.yaml
  governance_path: policies/tool_governance.yaml
deferred_surfaces:
  - daemon
  - realtime_chat
  - cli_task_commands
  - task_mutation_cli
  - scheduler
  - tool_execution
