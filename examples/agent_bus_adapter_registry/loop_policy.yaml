version: 0.1.0
name: file_bus_loop_handoff_policy
runtime_layout:
  root: .agent_bus
  ledger: .agent_bus/ledger.jsonl
  tasks: .agent_bus/tasks
  evidence: .agent_bus/evidence
  reviews: .agent_bus/reviews
  tool_gates: .agent_bus/tool_gates
  approvals: .agent_bus/approvals
  preflight: .agent_bus/preflight
  adapters: .agent_bus/adapters
  handoffs: .agent_bus/handoffs
fixture_layout:
  root: examples/agent_bus_handoff
  ledger: examples/agent_bus_handoff/ledger.jsonl
  tasks: examples/agent_bus_handoff/tasks
  evidence: examples/agent_bus_handoff/evidence
  reviews: examples/agent_bus_handoff/reviews
  tool_gates: examples/agent_bus_handoff/tool_gates
  approvals: examples/agent_bus_handoff/approvals
  preflight: examples/agent_bus_handoff/preflight
  adapters: examples/agent_bus_handoff/adapters
  handoffs: examples/agent_bus_handoff/handoffs
source_of_truth:
  ledger_jsonl: true
  tool_gate_reports_are_evidence: true
  approval_records_are_audit_evidence: true
  preflight_reports_are_audit_evidence: true
  execution_handoffs_are_control_plane_artifacts: true
  decisions_log: deferred
tool_gate_validation:
  policy_path: examples/agent_policy.example.yaml
  governance_path: policies/tool_governance.yaml
deferred_surfaces:
  - daemon
  - realtime_chat
  - cli_task_commands
  - task_mutation_cli
  - scheduler
  - watcher
  - runner
  - tool_execution
  - runtime_adapter_invocation

